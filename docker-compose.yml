services:
  postgres:
    image: postgres:15
    container_name: seekspider-postgres
    environment:
      POSTGRES_USER: seekuser
      POSTGRES_PASSWORD: seekpass
      POSTGRES_DB: seekdb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seekspider-scheduler
    depends_on:
      - postgres
    env_file:
      - ./scraper/.env
    environment:
      SCHEDULER_TIMEZONE: Australia/Melbourne
      WEEKDAY_SCHEDULE_TIMES: "08:07,10:02,12:13,14:06,16:07,18:31,22:09"
      WEEKEND_SCHEDULE_TIMES: "09:41,14:37,17:31,21:51"
      SPIDER_NAME: seek
      SPIDER_ARGS: "region=Melbourne"
      SCRAPY_BIN: scrapy
      SCRAPY_PROJECT_DIR: /app/scraper
      LOG_LEVEL: INFO
      # set true to force one run at container startup (for testing)
      RUN_ON_START: "true"
    volumes:
      - ./data:/app/data
      - ./scraper/.env:/app/scraper/.env:ro
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: seekspider-api
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: seekuser
      POSTGRES_PASSWORD: seekpass
      POSTGRES_DB: seekdb
      POSTGRES_TABLE: seek_jobs
    ports:
      - "127.0.0.1:6059:8000"
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: seekspider-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: