services:

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seekspider-scheduler
    environment:
      DATABASE_ENGINE: ${DATABASE_ENGINE:?DATABASE_ENGINE is required}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/data/seek_jobs.sqlite3}
      DATABASE_TABLE: ${DATABASE_TABLE:?DATABASE_TABLE is required}

      POSTGRESQL_HOST: ${POSTGRESQL_HOST:-${POSTGRES_HOST:-}}
      POSTGRESQL_PORT: ${POSTGRESQL_PORT:-${POSTGRES_PORT:-}}
      POSTGRESQL_USER: ${POSTGRESQL_USER:-${POSTGRES_USER:-}}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD:-${POSTGRES_PASSWORD:-}}
      POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE:-${POSTGRES_DB:-}}
      POSTGRESQL_TABLE: ${POSTGRESQL_TABLE:-${DATABASE_TABLE:?DATABASE_TABLE is required}}

      POSTGRES_HOST: ${POSTGRES_HOST:-${POSTGRESQL_HOST:-}}
      POSTGRES_PORT: ${POSTGRES_PORT:-${POSTGRESQL_PORT:-}}
      POSTGRES_USER: ${POSTGRES_USER:-${POSTGRESQL_USER:-}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${POSTGRESQL_PASSWORD:-}}
      POSTGRES_DB: ${POSTGRES_DB:-${POSTGRESQL_DATABASE:-}}
      POSTGRES_TABLE: ${POSTGRES_TABLE:-${POSTGRESQL_TABLE:-${DATABASE_TABLE:?DATABASE_TABLE is required}}}

      SCHEDULER_TIMEZONE: Australia/Melbourne
      WEEKDAY_SCHEDULE_TIMES: "08:07,10:02,12:13,14:06,16:07,18:31,22:09"
      WEEKEND_SCHEDULE_TIMES: "09:41,14:37,17:31,21:51"
      SPIDER_NAME: seek
      SPIDER_ARGS: "region=Melbourne"
      SCRAPY_BIN: scrapy
      SCRAPY_PROJECT_DIR: /app/scraper
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      RUN_ON_START: "true"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - /var/lib/seek-app/data:/app/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: seekspider-api
    environment:
      DATABASE_ENGINE: ${DATABASE_ENGINE:?DATABASE_ENGINE is required}
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/data/seek_jobs.sqlite3}
      DATABASE_TABLE: ${DATABASE_TABLE:?DATABASE_TABLE is required}

      POSTGRESQL_HOST: ${POSTGRESQL_HOST:-${POSTGRES_HOST:-}}
      POSTGRESQL_PORT: ${POSTGRESQL_PORT:-${POSTGRES_PORT:-}}
      POSTGRESQL_USER: ${POSTGRESQL_USER:-${POSTGRES_USER:-}}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD:-${POSTGRES_PASSWORD:-}}
      POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE:-${POSTGRES_DB:-}}
      POSTGRESQL_TABLE: ${POSTGRESQL_TABLE:-${DATABASE_TABLE:?DATABASE_TABLE is required}}

      POSTGRES_HOST: ${POSTGRES_HOST:-${POSTGRESQL_HOST:-}}
      POSTGRES_PORT: ${POSTGRES_PORT:-${POSTGRESQL_PORT:-}}
      POSTGRES_USER: ${POSTGRES_USER:-${POSTGRESQL_USER:-}}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-${POSTGRESQL_PASSWORD:-}}
      POSTGRES_DB: ${POSTGRES_DB:-${POSTGRESQL_DATABASE:-}}
      POSTGRES_TABLE: ${POSTGRES_TABLE:-${POSTGRESQL_TABLE:-${DATABASE_TABLE:?DATABASE_TABLE is required}}}
    ports:
      - "127.0.0.1:6059:8000"
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - /var/lib/seek-app/data:/app/data
    restart: unless-stopped