services:
  postgres:
    image: postgres:15
    container_name: seekspider-postgres
    environment:
      POSTGRES_USER: seekuser
      POSTGRES_PASSWORD: seekpass
      POSTGRES_DB: seekdb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  seekspider:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: seekspider
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:6059:8000"
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USER: seekuser
      POSTGRESQL_PASSWORD: seekpass
      POSTGRESQL_DATABASE: seekdb
      POSTGRESQL_TABLE: seek_jobs
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      AI_MODEL: ${AI_MODEL}
      PYTHONPATH: /app/pipeline:/app:/app/src:/app/scraper
      PYTHONUNBUFFERED: 1
      TZ: Australia/Perth
      OUTPUT_PATH: /app/output
      DATA_PATH: /app/data
      DATABASE_URL: sqlite:////app/data/plombery.db
    volumes:
      - ./.env:/app/.env:ro
      - ./output:/app/output
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: seekspider-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: